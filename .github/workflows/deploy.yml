# 前端：构建并部署到 GitHub Pages
# 后端：构建 Docker 镜像并推送到 ghcr.io（GitHub Packages）
#
# push：仅当对应路径有变更时才构建前端 / 打包镜像（共享 package.json 时可能两者都跑）
# workflow_dispatch：始终构建前端并打包镜像
#
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选择「GitHub Actions」。
# 静态资源路径见仓库 Variable VITE_BASE_URL（自定义域名根路径常用 /）。
# GitHub Pages SPA：复制 index.html → 404.html

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.out.outputs.frontend }}
      docker: ${{ steps.out.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            docker:
              - 'server/**'
              - 'Dockerfile'
              - 'tsconfig.server.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'

      - id: out
        run: |
          FE='${{ steps.filter.outputs.frontend }}'
          DK='${{ steps.filter.outputs.docker }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FE=true
            DK=true
          fi
          echo "frontend=$FE" >> "$GITHUB_OUTPUT"
          echo "docker=$DK" >> "$GITHUB_OUTPUT"
          echo "frontend=$FE docker=$DK"

  frontend:
    name: Build frontend (GitHub Pages)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set Vite base (VITE_BASE_URL)
        env:
          CUSTOM_BASE: ${{ vars.VITE_BASE_URL }}
        run: |
          if [ -n "$CUSTOM_BASE" ]; then
            echo "VITE_BASE_URL=$CUSTOM_BASE" >> "$GITHUB_ENV"
          else
            NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
            echo "VITE_BASE_URL=/${NAME}/" >> "$GITHUB_ENV"
          fi
          echo "Built with VITE_BASE_URL=$VITE_BASE_URL"

      - name: Install & build client
        run: |
          npm ci
          npm run build:client

      - name: Copy index.html to 404.html (GitHub Pages SPA)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Publish to GitHub Pages
    needs: frontend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  docker:
    name: Build & push Docker (ghcr.io)
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase, ghcr.io)
        id: image
        run: |
          IMG=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${IMG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
