# 前端：构建并部署到 GitHub Pages
# 后端：构建 Docker 镜像并推送到 ghcr.io（GitHub Packages）
#
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选择「GitHub Actions」。
# 静态站点若部署在 https://<user>.github.io/<repo>/ ，请在构建产物中通过 VITE_* 配置 API 地址（如 Secrets）。

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

jobs:
  frontend:
    name: Build frontend (GitHub Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Compute Vite base for GitHub Pages
        run: |
          NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "VITE_BASE_URL=/${NAME}/" >> "$GITHUB_ENV"

      - name: Install & build client
        run: |
          npm ci
          npm run build:client

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Publish to GitHub Pages
    needs: frontend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  docker:
    name: Build & push Docker (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase, ghcr.io)
        id: image
        run: |
          IMG=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${IMG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
